<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <title>code connect</title>
</head>

<body>
    <aside>
        <img src="./img/Logo.svg" alt="Logo do codeConnect">
        <nav>
            <ul class="lista-links">
                <li>
                    <a href="#" class="link-destaque">Publicar</a>
                </li>
                <li>
                    <a href="#">
                        <img src="./img/feed.svg" alt="Feed">
                        Feed
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="./img/account_circle.svg" alt="Perfil">
                        Perfil
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="./img/info.svg" alt="Sobre nós">
                        Sobre nós
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="./img/logout.svg" alt="Sair">
                        Sair
                    </a>
                </li>
            </ul>
        </nav>
    </aside>                                                                                
    <main>
        <div class="container-upload-imagem">
            <div class="container-imagem">
                <img src="./img/imagem1.png" alt="Pré-visualização da imagem do projeto" class="main-image">
            </div>
            <button id="upload-btn">Carregar Imagem</button>
            <input type="file" id="image-upload" accept="image/png, image/jpeg" style="display: none">
            <div class="container-imagem-nome">
                <p>image_projeto.png</p>
                <img src="./img/close.svg">
            </div>
        </div>
        <div class="container-descricao">
            <h2>Novo Projeto</h2>
            <form>
                <div>
                    <label for="nome">Nome do Projeto</label>
                    <input type="text" id="nome" name="nome" required>
                </div>
                <div>
                    <label for="description">Descrição</label>
                    <textarea name="description" id="description" required></textarea>
                </div>
                <div>
                    <label for="input-tags">Tags</label>
                    <input type="text" id="input-tags" name="categoria">
                </div>
                <ul class="lista-tags" id="list-tags">
                </ul>
                <div class="container-botoes">
                    <button type="button" class="discard-button">Descartar</button>
                    <button type="button" class="publish-button">Publicar</button>
                </div>
            </form>
        </div>
    </main>
    <script type="module" src="./src/main.js"></script>
</body>

</html>
